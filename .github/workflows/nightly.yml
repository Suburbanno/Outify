name: Android Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache Cargo (librespot)
        uses: actions/cache@v3
        with:
          path: |
            rust/deps/librespot/target
            ~/.cargo/registry
            ~/.cargo/git
          key: librespot-rust-${{ runner.os }}-${{ hashFiles('rust/deps/librespot/Cargo.lock') }}
          restore-keys: |
            librespot-rust-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Debug git state
        run: |
          echo "HEAD COMMIT:"
          git rev-parse HEAD
          echo "Submodule pointer:"
          git ls-tree HEAD rust/deps/librespot || true
          echo "Submodule status:"
          git submodule status || true

      - name: Ensure submodules are synced
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Generate version name
        id: version
        run: |
          VERSION="nightly-$(date +'%Y.%m.%d')"
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Export NDK path
        run: echo "ANDROID_NDK=${{ steps.ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Build librespot
        run: |
          chmod +x ./buildLibrespot.sh
          ./buildLibrespot.sh

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Verify keystore
        run: ls -l app/release.keystore

      - name: Build signed release
        env:
          ANDROID_KEYSTORE_FILE: app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build ${{ env.VERSION_NAME }}
          prerelease: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
