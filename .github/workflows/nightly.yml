name: Android Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      librespot_commit: ${{ steps.librespot_commit.outputs.commit }}
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Compute librespot commit
        id: librespot_commit
        run: |
          echo "commit=$(git -C rust/deps/librespot rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Generate version name
        id: version
        run: |
          VERSION="nightly-$(date +'%Y.%m.%d')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache Cargo (librespot)
        uses: actions/cache@v3
        with:
          path: |
            rust/deps/librespot/target
            ~/.cargo/registry
            ~/.cargo/git
          key: librespot-rust-${{ runner.os }}-${{ steps.librespot_commit.outputs.commit }}-${{ hashFiles('rust/deps/librespot/Cargo.lock') }}
          restore-keys: |
            librespot-rust-${{ runner.os }}-${{ steps.librespot_commit.outputs.commit }}-
            librespot-rust-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*', 'settings.gradle*') }}

  librespot_build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Restore Cargo cache
        uses: actions/cache@v3
        with:
          path: rust/deps/librespot/target
          key: librespot-rust-${{ runner.os }}-${{ needs.setup.librespot_commit }}-${{ hashFiles('rust/deps/librespot/Cargo.lock') }}
          restore-keys: |
            librespot-rust-${{ runner.os }}-${{ needs.setup.librespot_commit }}-
            librespot-rust-${{ runner.os }}-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Export NDK path
        run: echo "ANDROID_NDK=${{ steps.ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Build librespot
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/deps/librespot/target
        run: |
          chmod +x ./buildLibrespot.sh
          ./buildLibrespot.sh

  android_build:
    runs-on: ubuntu-latest
    needs: librespot_build
    env:
      ANDROID_KEYSTORE_FILE: app/release.keystore
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      VERSION_NAME: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build signed release
        run: ./gradlew assembleRelease

  publish_release:
    runs-on: ubuntu-latest
    needs: android_build
    env:
      VERSION_NAME: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build ${{ env.VERSION_NAME }}
          prerelease: true
          files: |
            app/build/outputs/apk/release/*.apk
          overwrite_files: true
          token: ${{ secrets.GH_PAT }}
